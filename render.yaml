services:
  - type: web
    name: chatapp
    runtime: image
    repo: https://github.com/DuyVu1204/chatapp
    branch: main
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000